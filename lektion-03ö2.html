<script>
let x=1

function checkNumber(x) {
if (x < 0){
    console.log("Talet är positivt")
}
else if (x > 0) {
    console.log("Talet är negativt")
}
else {
    console.log("Talet är 0")
}
}
checkNumber(5)
checkNumber(-3)
</script>
