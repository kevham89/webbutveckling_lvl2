<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <h1>Hej Bootstrap!</h1>
    <!-- py-4 betyder (p)adding (y)axis -->
    <div class="container py-4">
        <!-- mb-4 betyder (m)argin-(b)ottom -->
        <h1 class="mb-4">Min Responsiva layout</h1>
        <!-- g-3 betyder (g)utter (mellanrum mellan kolumner) -->
        <div class="row g-3">
            <!-- 
            col-12      100% bredd (mobil)
            col-md-6    50% bredd (tablet)
            col-lg-4    33% bredd (desktop)
            -->
            <div class="col-12 col-md6 col-lg-4">
                <div class="p-3 border rounded">Kolumn 1</div>
            </div>
            <div class="col-12 col-md6 col-lg-4">
                <div class="p-3 border rounded">Kolumn 2</div>
            </div>
            <div class="col-12 col-md-12 col-lg-4">
                <div class="p-3 border rounded">Kolumn 3</div>
            </div>

        </div>
    </div>

    
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
</body>
</html>
