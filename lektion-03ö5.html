<script>
    let tal1 = Number(prompt("Skriv in ett tal").trim());
    let tal2 = Number(prompt("Skriv in ett tal").trim());
    if (isNaN(tal1)){ // det här är redudant, vi testar om värdet är ett tal redan i prompten med Number()
        console.log("Ogiltigt värde för tal1");
    }
    else if (isNaN(tal2)){
        console.log("Ogiltigt värde för tal2");
    }
    else {
        let resultat = (tal1 * tal2)
        console.log("Resultatet är", resultat)
    }
</script>
