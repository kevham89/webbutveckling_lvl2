<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <script>
        let age=prompt("Hur gammal är du?");
        switch (true) { // jämför "true" mot varje case
            case (age < 18 ):
                document.write("Kom tillbaka om ett par år");
                break;
            case (age >= 18):
                document.write("Välkommen");
                break;
            default:
                document.write("Fel värde. Försök igen.");
                // om värdet inte är något utav ovan så kör denna kod
                break;
        }
     </script>
</body>
</html>
